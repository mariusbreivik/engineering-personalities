<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Conviction meter at 42 percent</title>
  <desc id="desc">A dark terminal style screenshot showing partial persuasion, some resolved objections, and a still rejected verdict.</desc>
