  <text x="72" y="145" fill="#E5E7EB" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="40" font-weight="700">Current Conviction</text>
  <text x="72" y="188" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">Humans approve drafts, PII is redacted, quality metrics still weak</text>

