  <text x="72" y="485" fill="#10B981" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28">✓ Security</text>
  <text x="72" y="528" fill="#10B981" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28">✓ Human review</text>
  <text x="72" y="571" fill="#F87171" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28">✗ Quality metrics</text>
