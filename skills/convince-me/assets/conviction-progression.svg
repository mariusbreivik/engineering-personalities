    <text x="28" y="48" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700">91% · Approved</text>
    <text x="28" y="84" fill="#86EFAC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">The proposal finally did the unfashionable thing and arrived with evidence.</text>
