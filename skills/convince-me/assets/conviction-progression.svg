<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Conviction meter progression</title>
  <desc id="desc">A four-panel visual showing conviction moving from rejected to approved as objections are resolved.</desc>
  <rect width="1600" height="1100" rx="28" fill="#0B1020"/>
  <text x="64" y="88" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="800">Conviction Meter Progression</text>
  <text x="64" y="132" fill="#94A3B8" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">Same skill, different evidence quality. The score moves only when objections are actually answered.</text>

  <g transform="translate(64 188)">
    <rect width="704" height="390" rx="20" fill="#111827" stroke="#334155"/>
    <text x="28" y="48" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700">08% · Rejected</text>
    <text x="28" y="84" fill="#FB923C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">"Everyone serious uses it"</text>
    <rect x="28" y="120" width="54" height="36" rx="8" fill="#F97316"/>
    <rect x="92" y="120" width="54" height="36" rx="8" fill="#1F2937"/>
    <rect x="156" y="120" width="54" height="36" rx="8" fill="#1F2937"/>
    <rect x="220" y="120" width="54" height="36" rx="8" fill="#1F2937"/>
