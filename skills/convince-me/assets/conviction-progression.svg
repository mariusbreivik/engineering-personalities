    <text x="28" y="258" fill="#F87171" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">✗ Ownership</text>
    <text x="28" y="294" fill="#F87171" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">✗ Rollback</text>
    <text x="28" y="330" fill="#F87171" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">✗ Cost</text>
  </g>

