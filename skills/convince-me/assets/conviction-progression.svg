    <text x="28" y="258" fill="#10B981" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">✓ Ownership</text>
    <text x="28" y="294" fill="#10B981" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">✓ Rollback</text>
